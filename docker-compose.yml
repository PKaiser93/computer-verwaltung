services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: computerverwaltung
      POSTGRES_USER: computermgmt
      POSTGRES_PASSWORD: dev123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  backend:
    build: ./backend
    ports:
      - "3001:3000"
    env_file:
      - .env
    volumes:
      - ./backend/src:/usr/src/app/src  # Nur Source mounten
      - ./backend/prisma:/usr/src/app/prisma
    command: sh -c "npx prisma generate && npm run start:dev"
    depends_on:
      - postgres
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
